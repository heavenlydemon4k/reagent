# ==============================================================================
# Reagent — CI/CD Pipeline
# ==============================================================================
# Triggers: push to main, PR targeting main
# Jobs:
#   test   — per-module Go tests + isolated Python venvs per service
#   build  — Docker images for all 9 service containers
#   push   — ECR push (main branch only)
#   deploy — ECS rolling deployment (main branch only)
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "**.py"
      - "Dockerfile*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - ".github/workflows/ci.yml"
      - "**/migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "**.py"
      - "Dockerfile*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - ".github/workflows/ci.yml"
      - "**/migrations/**"

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Job: test
# ==============================================================================
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Go setup
      # Cache is keyed per-service so a change in one service does not
      # invalidate the cache for others.
      # -------------------------------------------------------------------------
      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # Disable the built-in cache — we manage it per service below.
          cache: false

      # Per-service Go module caches
      - name: Cache Go modules — ingestion
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-ingestion-${{ hashFiles('ingestion/go.sum') }}
          restore-keys: go-ingestion-

      - name: Cache Go modules — classification
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-classification-${{ hashFiles('classification/go.sum') }}
          restore-keys: go-classification-

      - name: Cache Go modules — sync
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-sync-${{ hashFiles('sync/go.sum') }}
          restore-keys: go-sync-

      - name: Cache Go modules — shared/logutil
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-logutil-${{ hashFiles('shared/logutil/go.mod') }}
          restore-keys: go-logutil-

      - name: Cache Go modules — tests/integration
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-integration-${{ hashFiles('tests/integration/go.mod') }}
          restore-keys: go-integration-

      # -------------------------------------------------------------------------
      # Go tests — each service is tested in isolation within its own module
      # -------------------------------------------------------------------------
      - name: Test — shared/logutil
        run: |
          cd shared/logutil
          go mod download
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout 5m

      # Integration tests are skipped (t.Skip) unless infra is running.
      # go test still compiles the test files, so this catches type drift
      # between the mirror structs and the canonical service definitions.
      - name: Test — tests/integration
        run: |
          cd tests/integration
          go test ./... -count=1 -timeout 2m

      - name: Test — ingestion
        run: |
          cd ingestion
          go mod download
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout 10m
        env:
          CGO_ENABLED: 0

      - name: Test — classification
        run: |
          cd classification
          go mod download
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout 10m
        env:
          CGO_ENABLED: 0

      - name: Test — sync
        run: |
          cd sync
          go mod download
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout 10m
        env:
          CGO_ENABLED: 0

      # -------------------------------------------------------------------------
      # Python setup
      # Each service gets its own virtual environment so dependency conflicts
      # between services are isolated and cannot break each other.
      # -------------------------------------------------------------------------
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -------------------------------------------------------------------------
      # Client — TypeScript type-check (no build, just tsc --noEmit)
      # -------------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Test — client (TypeScript)
        run: |
          cd client
          npm ci --legacy-peer-deps
          npx tsc --noEmit

      # intelligence — uses pyproject.toml (Poetry-managed, installable package)
      - name: Cache pip — intelligence
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-intelligence-${{ hashFiles('intelligence/pyproject.toml') }}
          restore-keys: pip-intelligence-

      - name: Test — intelligence
        run: |
          python -m venv .venv-intelligence
          source .venv-intelligence/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -e intelligence/
          pip install --quiet pytest pytest-asyncio pytest-cov pytest-timeout
          cd intelligence
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -p no:cacheprovider
        env:
          PYTHONPATH: intelligence

      # -------------------------------------------------------------------------
      # Peripheral services — use requirements.txt; failures are non-fatal
      # because external API clients (Deepgram, ElevenLabs) require real keys
      # that are not present in CI. Tests use mocks but import errors surface
      # here when optional deps are unavailable on the runner.
      # -------------------------------------------------------------------------
      - name: Cache pip — services/ocr
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ocr-${{ hashFiles('services/ocr/requirements.txt') }}
          restore-keys: pip-ocr-

      - name: Test — services/ocr
        continue-on-error: true
        run: |
          python -m venv .venv-ocr
          source .venv-ocr/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -r services/ocr/requirements.txt
          pip install --quiet pytest pytest-asyncio pytest-cov pytest-timeout
          cd services/ocr
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -p no:cacheprovider
        env:
          PYTHONPATH: services/ocr

      - name: Cache pip — services/stt
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-stt-${{ hashFiles('services/stt/requirements.txt') }}
          restore-keys: pip-stt-

      - name: Test — services/stt
        continue-on-error: true
        run: |
          python -m venv .venv-stt
          source .venv-stt/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -r services/stt/requirements.txt
          pip install --quiet pytest pytest-asyncio pytest-cov pytest-timeout
          cd services/stt
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -p no:cacheprovider
        env:
          PYTHONPATH: services/stt

      - name: Cache pip — services/tts
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-tts-${{ hashFiles('services/tts/requirements.txt') }}
          restore-keys: pip-tts-

      - name: Test — services/tts
        continue-on-error: true
        run: |
          # Strip the leading whitespace from the elevenlabs line before install.
          sed 's/^ elevenlabs/elevenlabs/' services/tts/requirements.txt > /tmp/tts-requirements.txt
          python -m venv .venv-tts
          source .venv-tts/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -r /tmp/tts-requirements.txt
          pip install --quiet pytest pytest-asyncio pytest-cov pytest-timeout
          cd services/tts
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -p no:cacheprovider
        env:
          PYTHONPATH: services/tts

      - name: Cache pip — services/calendar
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-calendar-${{ hashFiles('services/calendar/requirements.txt') }}
          restore-keys: pip-calendar-

      - name: Test — services/calendar
        continue-on-error: true
        run: |
          python -m venv .venv-calendar
          source .venv-calendar/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -r services/calendar/requirements.txt
          pip install --quiet pytest pytest-asyncio pytest-cov pytest-timeout
          cd services/calendar
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -p no:cacheprovider
        env:
          PYTHONPATH: services/calendar

      # -------------------------------------------------------------------------
      # Upload coverage
      # -------------------------------------------------------------------------
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: >-
            ./shared/logutil/coverage.out,
            ./ingestion/coverage.out,
            ./classification/coverage.out,
            ./sync/coverage.out,
            ./intelligence/coverage.xml,
            ./services/ocr/coverage.xml,
            ./services/stt/coverage.xml,
            ./services/tts/coverage.xml,
            ./services/calendar/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Job: build — Build Docker images for all 9 services
  # ============================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    strategy:
      matrix:
        service:
          - name: ingestion
            dockerfile: ./ingestion/Dockerfile
            context: ./ingestion
          - name: classification
            dockerfile: ./classification/Dockerfile
            context: ./classification
          - name: intelligence
            dockerfile: ./intelligence/Dockerfile
            context: ./intelligence
          - name: sync
            dockerfile: ./sync/Dockerfile
            context: ./sync
          - name: ocr
            dockerfile: ./services/ocr/Dockerfile
            context: ./services/ocr
          - name: stt
            dockerfile: ./services/stt/Dockerfile
            context: ./services/stt
          - name: tts
            dockerfile: ./services/tts/Dockerfile
            context: ./services/tts
          - name: calendar
            dockerfile: ./services/calendar/Dockerfile
            context: ./services/calendar
          - name: client
            dockerfile: ./client/Dockerfile
            context: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
        with:
          mask-password: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/reagent/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          platforms: linux/amd64
          provenance: false

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/reagent/${{ matrix.service.name }}:sha-${{ github.sha }}
          format: "sarif"
          output: "trivy-${{ matrix.service.name }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service.name }}.sarif"

  # ============================================================================
  # Job: push — Push images to ECR (main only)
  # ============================================================================
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    strategy:
      max-parallel: 1
      matrix:
        service:
          - name: ingestion
            dockerfile: ./ingestion/Dockerfile
            context: ./ingestion
          - name: classification
            dockerfile: ./classification/Dockerfile
            context: ./classification
          - name: intelligence
            dockerfile: ./intelligence/Dockerfile
            context: ./intelligence
          - name: sync
            dockerfile: ./sync/Dockerfile
            context: ./sync
          - name: ocr
            dockerfile: ./services/ocr/Dockerfile
            context: ./services/ocr
          - name: stt
            dockerfile: ./services/stt/Dockerfile
            context: ./services/stt
          - name: tts
            dockerfile: ./services/tts/Dockerfile
            context: ./services/tts
          - name: calendar
            dockerfile: ./services/calendar/Dockerfile
            context: ./services/calendar
          - name: client
            dockerfile: ./client/Dockerfile
            context: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
        with:
          mask-password: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/reagent/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          platforms: linux/amd64
          provenance: false

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name reagent/${{ matrix.service.name }} \
            --image-ids imageTag=sha-${{ github.sha }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

  # ============================================================================
  # Job: deploy — Update ECS task definitions and trigger rolling deployment
  # ============================================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # --- Render task definition templates ---
      - name: Render ingestion task definition
        id: render-ingestion
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/ingestion.json.tpl
          container-name: ingestion
          image: ${{ env.ECR_REGISTRY }}/reagent/ingestion:sha-${{ github.sha }}

      - name: Render classification task definition
        id: render-classification
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/classification.json.tpl
          container-name: classification
          image: ${{ env.ECR_REGISTRY }}/reagent/classification:sha-${{ github.sha }}

      - name: Render intelligence task definition
        id: render-intelligence
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/intelligence.json.tpl
          container-name: intelligence
          image: ${{ env.ECR_REGISTRY }}/reagent/intelligence:sha-${{ github.sha }}

      - name: Render sync task definition
        id: render-sync
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/sync.json.tpl
          container-name: sync
          image: ${{ env.ECR_REGISTRY }}/reagent/sync:sha-${{ github.sha }}

      - name: Render OCR task definition
        id: render-ocr
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/ocr.json.tpl
          container-name: ocr
          image: ${{ env.ECR_REGISTRY }}/reagent/ocr:sha-${{ github.sha }}

      - name: Render STT task definition
        id: render-stt
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/stt.json.tpl
          container-name: stt
          image: ${{ env.ECR_REGISTRY }}/reagent/stt:sha-${{ github.sha }}

      - name: Render TTS task definition
        id: render-tts
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/tts.json.tpl
          container-name: tts
          image: ${{ env.ECR_REGISTRY }}/reagent/tts:sha-${{ github.sha }}

      - name: Render Calendar task definition
        id: render-calendar
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-defs/calendar.json.tpl
          container-name: calendar
          image: ${{ env.ECR_REGISTRY }}/reagent/calendar:sha-${{ github.sha }}

      # --- Deploy to ECS ---
      - name: Deploy ingestion service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-ingestion.outputs.task-definition }}
          service: ingestion
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy classification service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-classification.outputs.task-definition }}
          service: classification
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy intelligence service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-intelligence.outputs.task-definition }}
          service: intelligence
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy sync service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-sync.outputs.task-definition }}
          service: sync
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy OCR service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-ocr.outputs.task-definition }}
          service: ocr
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy STT service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-stt.outputs.task-definition }}
          service: stt
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy TTS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-tts.outputs.task-definition }}
          service: tts
          cluster: reagent-prod
          wait-for-service-stability: true

      - name: Deploy Calendar service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-calendar.outputs.task-definition }}
          service: calendar
          cluster: reagent-prod
          wait-for-service-stability: true

      # --- Verify deployment ---
      - name: Verify all services stable
        run: |
          echo "Checking service stability..."
          for service in ingestion classification intelligence sync ocr stt tts calendar; do
            status=$(aws ecs describe-services \
              --cluster reagent-prod \
              --services "$service" \
              --query 'services[0].deployments[0].status' \
              --output text)
            if [ "$status" != "PRIMARY" ]; then
              echo "ERROR: Service $service deployment status is $status"
              exit 1
            fi
            running=$(aws ecs describe-services \
              --cluster reagent-prod \
              --services "$service" \
              --query 'services[0].runningCount' \
              --output text)
            desired=$(aws ecs describe-services \
              --cluster reagent-prod \
              --services "$service" \
              --query 'services[0].desiredCount' \
              --output text)
            if [ "$running" -lt "$desired" ]; then
              echo "ERROR: Service $service has $running/$desired tasks running"
              exit 1
            fi
            echo "OK: $service — $running/$desired tasks running, deployment=$status"
          done
          echo "All services deployed successfully."
