version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reagent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reagent}
      POSTGRES_DB: ${POSTGRES_DB:-reagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reagent

  redis:
    image: redis:7-alpine
    container_name: reagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reagent

  qdrant:
    image: qdrant/qdrant:v1.8.1
    container_name: reagent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-qdrant_dev_key_change_me}
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - reagent

  neo4j:
    image: neo4j:5.16-community
    container_name: reagent-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/reagent}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/dbms/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - reagent

  nats:
    image: nats:2.10-alpine
    container_name: reagent-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: >
      --jetstream
      --store_dir /data/jetstream
      --max_memory_store 512Mi
      --max_file_store 10Gi
      --http_port 8222
      --port 4222
    volumes:
      - nats_jetstream:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reagent

  nats-setup:
    image: natsio/nats-cli:0.1.4
    container_name: reagent-nats-setup
    depends_on:
      nats:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
      sleep 5 &&
      nats --server nats://nats:4222 stream add EMAIL_INGESTED --subjects "email.ingested" --storage file --retention work --max-msgs=-1 --max-bytes=-1 --max-age=-1 --replicas 1 --yes 2>/dev/null || true &&
      nats --server nats://nats:4222 stream add EMAIL_CLASSIFIED --subjects "email.classified" --storage file --retention work --max-msgs=-1 --max-bytes=-1 --max-age=-1 --replicas 1 --yes 2>/dev/null || true &&
      nats --server nats://nats:4222 stream add INTELLIGENCE_COMPRESS --subjects "intelligence.compress" --storage file --retention work --max-msgs=-1 --max-bytes=-1 --replicas 1 --yes 2>/dev/null || true &&
      echo "=== Streams configured ==="
      '
    networks:
      - reagent
    restart: "no"

  qdrant-setup:
    image: curlimages/curl:latest
    container_name: reagent-qdrant-setup
    depends_on:
      qdrant:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
      sleep 5 &&
      curl -sfS -X PUT http://qdrant:6333/collections/emails -H "Content-Type: application/json" -d "{"vectors":{"size":1536,"distance":"Cosine","on_disk":true},"on_disk_payload":true}" 2>/dev/null || true &&
      echo "=== Qdrant collections created ==="
      '
    networks:
      - reagent
    restart: "no"

  intelligence:
    build:
      context: ../../intelligence
      dockerfile: Dockerfile
    container_name: reagent-intelligence
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://reagent:reagent@postgres:5432/reagent}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-reagent}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      INGESTION_URL: ${INGESTION_URL:-http://ingestion:8080}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - reagent

  client:
    build:
      context: ../../client
      dockerfile: Dockerfile
    container_name: reagent-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/chat/ws}
    depends_on:
      - intelligence
    networks:
      - reagent

networks:
  reagent:
    name: reagent
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  qdrant_snapshots:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  nats_jetstream:
