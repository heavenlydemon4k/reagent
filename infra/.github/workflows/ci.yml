name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  TF_VERSION: '1.7.0'

# Prevent concurrent deployments to the same environment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================================================
  # 1. Test & Lint
  # ========================================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests

  # ========================================================================
  # 2. Build & Push Container Images
  # ========================================================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    # Only build on pushes to main or release branches
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - ingestion
          - classification
          - intelligence
          - sync
          - ocr
          - stt
          - tts
          - calendar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/decision-stack-staging-${{ matrix.service }}
          tags: |
            type=sha,prefix=staging-,format=short
            type=raw,value=staging-latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=staging
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ========================================================================
  # 3. Terraform Validate & Plan (Staging)
  # ========================================================================
  tf-plan-staging:
    name: Terraform Plan (Staging)
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: ./terraform/environments/staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        run: terraform plan -out=tfplan-staging
        env:
          TF_VAR_jwt_secret: ${{ secrets.STAGING_JWT_SECRET }}
          TF_VAR_origin_verify_header: ${{ secrets.STAGING_ORIGIN_VERIFY_HEADER }}
          TF_VAR_redis_auth_token: ${{ secrets.STAGING_REDIS_AUTH_TOKEN }}
          TF_VAR_qdrant_api_key: ${{ secrets.STAGING_QDRANT_API_KEY }}
          TF_VAR_neo4j_username: ${{ secrets.STAGING_NEO4J_USERNAME }}
          TF_VAR_neo4j_password: ${{ secrets.STAGING_NEO4J_PASSWORD }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_deepgram_api_key: ${{ secrets.DEEPGRAM_API_KEY }}
          TF_VAR_elevenlabs_api_key: ${{ secrets.ELEVENLABS_API_KEY }}
          TF_VAR_stripe_test_secret_key: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          TF_VAR_stripe_test_public_key: ${{ secrets.STRIPE_TEST_PUBLIC_KEY }}
          TF_VAR_stripe_test_webhook_secret: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: ./terraform/environments/staging/tfplan-staging
          retention-days: 1

  # ========================================================================
  # 4. Deploy to Staging (auto-deploy on merge to main)
  # ========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, tf-plan-staging]
    # Only deploy staging on pushes to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.terraform-output.outputs.cloudfront_domain }}
    defaults:
      run:
        working-directory: ./terraform/environments/staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ./terraform/environments/staging

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-staging
        env:
          TF_VAR_jwt_secret: ${{ secrets.STAGING_JWT_SECRET }}
          TF_VAR_origin_verify_header: ${{ secrets.STAGING_ORIGIN_VERIFY_HEADER }}
          TF_VAR_redis_auth_token: ${{ secrets.STAGING_REDIS_AUTH_TOKEN }}
          TF_VAR_qdrant_api_key: ${{ secrets.STAGING_QDRANT_API_KEY }}
          TF_VAR_neo4j_username: ${{ secrets.STAGING_NEO4J_USERNAME }}
          TF_VAR_neo4j_password: ${{ secrets.STAGING_NEO4J_PASSWORD }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_deepgram_api_key: ${{ secrets.DEEPGRAM_API_KEY }}
          TF_VAR_elevenlabs_api_key: ${{ secrets.ELEVENLABS_API_KEY }}
          TF_VAR_stripe_test_secret_key: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          TF_VAR_stripe_test_public_key: ${{ secrets.STRIPE_TEST_PUBLIC_KEY }}
          TF_VAR_stripe_test_webhook_secret: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}

      - name: Capture Terraform Outputs
        id: terraform-output
        run: |
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT

      - name: Force ECS Service Redeployment
        run: |
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service ingestion --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service classification --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service intelligence --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service sync --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service ocr --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service stt --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service tts --force-new-deployment || true
          aws ecs update-service --cluster ${{ steps.terraform-output.outputs.ecs_cluster }} \
            --service calendar --force-new-deployment || true

      - name: Notify Slack — Deploy Complete
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Staging deployment complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deploy Complete*\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• Author: ${{ github.actor }}\n• URL: https://${{ steps.terraform-output.outputs.cloudfront_domain }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_URL }}

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deploy Failed*\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• Author: ${{ github.actor }}\n• Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_URL }}

  # ========================================================================
  # 5. Terraform Plan (Production)
  # ========================================================================
  tf-plan-production:
    name: Terraform Plan (Production)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: ./terraform/environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        run: terraform plan -out=tfplan-production
        env:
          TF_VAR_jwt_secret: ${{ secrets.PRODUCTION_JWT_SECRET }}
          TF_VAR_origin_verify_header: ${{ secrets.PRODUCTION_ORIGIN_VERIFY_HEADER }}
          # ... other prod secrets

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: ./terraform/environments/production/tfplan-production
          retention-days: 5

  # ========================================================================
  # 6. Deploy to Production — REQUIRES MANUAL APPROVAL
  # ========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, tf-plan-production]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: production
      url: ${{ steps.terraform-output.outputs.cloudfront_domain }}
    defaults:
      run:
        working-directory: ./terraform/environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production
          path: ./terraform/environments/production

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-production
        env:
          TF_VAR_jwt_secret: ${{ secrets.PRODUCTION_JWT_SECRET }}
          TF_VAR_origin_verify_header: ${{ secrets.PRODUCTION_ORIGIN_VERIFY_HEADER }}
          # ... other prod secrets

      - name: Capture Terraform Outputs
        id: terraform-output
        run: |
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT

      - name: Notify Slack — Production Deploy
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production deployment complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deploy Complete*\n• Release: ${{ github.ref_name }}\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• URL: https://${{ steps.terraform-output.outputs.cloudfront_domain }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.PRODUCTION_SLACK_WEBHOOK_URL }}